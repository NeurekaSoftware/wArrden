name: warrden

services:
  warrden:
    image: registry.neureka.dev/warrden/warrden:4
    container_name: warrden
    environment:
      - TZ=UTC
      - PUID=1000
      - PGID=1000
      - DATABASE_PATH=/app/data/warden.db
      - CONFIG_PATH=/config/config.yaml
    networks:
      - warrden
    volumes:
      - data:/app/data
      - ./config.yaml:/config/config.yaml:ro
    restart: unless-stopped

networks:
  warrden:
    name: warrden

volumes:
  data:
