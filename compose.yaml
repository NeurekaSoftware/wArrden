services:
  arrwarden:
    image: ghcr.io/example/arrwarden:latest
    container_name: arrwarden
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - TZ=UTC
      - DRY_RUN=false
      - DATABASE_PATH=/app/data/warden.db

      - SONARR_URL=http://sonarr:8989
      - SONARR_API_KEY=YOUR_SONARR_API_KEY
      - SONARR_API_VERSION=3
      - SONARR_QUEUE_CLEANUP_CRON=*/5 * * * *
      - SONARR_MISSING_SEARCH_CRON=0 0 * * *
      - SONARR_UPGRADE_SEARCH_CRON=0 0 * * 0
      - SONARR_MISSING_MAX_RESULTS=100
      - SONARR_MISSING_COOLDOWN=30d
      - SONARR_UPGRADE_MAX_RESULTS=50
      - SONARR_UPGRADE_COOLDOWN=30d

      # "Not a Custom Format upgrade for existing episode file(s)"
      - SONARR_BLACKLIST_NOT_A_CUSTOM_FORMAT_UPGRADE=false
      # "Not an upgrade for existing episode file(s)"
      - SONARR_BLACKLIST_NOT_AN_UPGRADE=false
      # "Not a quality revision upgrade for existing episode file(s)"
      - SONARR_BLACKLIST_NOT_A_REVISION_UPGRADE=false
      # "Sample" / "Unable to determine if file is a sample"
      - SONARR_BLACKLIST_SAMPLE=false
      # "Unable to parse file" / "Unable to parse download, automatic import is not possible"
      - SONARR_BLACKLIST_UNABLE_TO_PARSE=false
      # "No files found are eligible for import in {path}"
      - SONARR_BLACKLIST_NO_FILES_ELIGIBLE=false
      # "Series title mismatch; automatic import is not possible"
      - SONARR_BLACKLIST_SERIES_MISMATCH=false
      # "Unable to import automatically, found multiple series"
      - SONARR_BLACKLIST_FOUND_MULTIPLE_SERIES=false
      # "Single episode file contains all episodes in seasons. Review file name or manually import"
      - SONARR_BLACKLIST_FULL_SEASON=false
      # "No audio tracks detected"
      - SONARR_BLACKLIST_NO_AUDIO_TRACKS=false
      # "Episode {#} was not found in the grabbed release: {title}"
      - SONARR_BLACKLIST_EPISODE_NOT_IN_RELEASE=false
      # "This show has individual episode mappings on TheXEM but the mapping has not been confirmed"
      - SONARR_BLACKLIST_UNVERIFIED_SCENE_MAPPING=false

      - RADARR_URL=http://radarr:7878
      - RADARR_API_KEY=YOUR_RADARR_API_KEY
      - RADARR_API_VERSION=3
      - RADARR_QUEUE_CLEANUP_CRON=*/5 * * * *
      - RADARR_MISSING_SEARCH_CRON=0 0 * * *
      - RADARR_UPGRADE_SEARCH_CRON=0 0 * * 0
      - RADARR_MISSING_MAX_RESULTS=100
      - RADARR_MISSING_COOLDOWN=30d
      - RADARR_UPGRADE_MAX_RESULTS=50
      - RADARR_UPGRADE_COOLDOWN=30d

      # "Not a Custom Format upgrade for existing movie file(s)"
      - RADARR_BLACKLIST_NOT_A_CUSTOM_FORMAT_UPGRADE=false
      # "Not an upgrade for existing movie file"
      - RADARR_BLACKLIST_NOT_AN_UPGRADE=false
      # "Not a quality revision upgrade for existing movie file(s)"
      - RADARR_BLACKLIST_NOT_A_REVISION_UPGRADE=false
      # "Sample" / "Unable to determine if file is a sample"
      - RADARR_BLACKLIST_SAMPLE=false
      # "Unable to parse file" / "Unable to parse download, automatic import is not possible"
      - RADARR_BLACKLIST_UNABLE_TO_PARSE=false
      # "No files found are eligible for import in {path}"
      - RADARR_BLACKLIST_NO_FILES_ELIGIBLE=false
      # "Movie title mismatch, automatic import is not possible. Manual Import required."
      - RADARR_BLACKLIST_MOVIE_MISMATCH=false
      # "Unable to import automatically, found multiple movies"
      - RADARR_BLACKLIST_FOUND_MULTIPLE_MOVIES=false
      # "No audio tracks detected"
      - RADARR_BLACKLIST_NO_AUDIO_TRACKS=false
      # "Movie was not found in the grabbed release"
      - RADARR_BLACKLIST_MOVIE_NOT_IN_RELEASE=false


