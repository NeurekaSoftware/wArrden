stages:
  - build
  - release

include:
  - component: $CI_SERVER_FQDN/components/docker/build@2.0.0
    inputs:
      job-name: build-edge
      tags: edge
      platforms: linux/amd64,linux/arm64
      build-args: --build-arg APP_VERSION=edge-$CI_COMMIT_SHORT_SHA
  - component: $CI_SERVER_FQDN/components/docker/build@2.0.0
    inputs:
      job-name: build-release
      tags: $CI_COMMIT_TAG ${CI_COMMIT_TAG%.*} ${CI_COMMIT_TAG%%.*} latest
      platforms: linux/amd64,linux/arm64
      build-args: --build-arg APP_VERSION=$CI_COMMIT_TAG
  - component: $CI_SERVER_FQDN/components/release/release@1.0.0
    inputs:
      changelog: CHANGELOG.md

# The docker build template ships no rules (it would otherwise run on every pipeline)
# and the release template runs on any tag; scope each generated job by overriding it.
build-edge:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

build-release:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/'

release:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/'
