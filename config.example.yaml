      action: removeAndBlocklist

    # This album release wasn't monitored/wanted.
    # Lidarr: "Album release not requested"
    - match: ALBUM_NOT_REQUESTED
      action: removeAndBlocklist

    # Your existing track file already contains more tracks.
    # Lidarr: "Track file on disk contains more tracks than this file contains"
    - match: EXISTING_FILE_MORE_TRACKS
      action: remove

    # The destination folder is not a configured root folder.
    # Lidarr: "Destination folder {pathToCheck} is not in a Root Folder"
    - match: DEST_FOLDER_NOT_ROOT
      action: removeAndBlocklist

    # Album metadata doesn't match closely enough to any known album.
    # Lidarr: "Album match is not close enough"
    - match: ALBUM_MATCH_NOT_CLOSE
      action: removeAndBlocklist

    # None of the tracks could be matched to known tracks.
    # Lidarr: "No tracks matched"
    - match: NO_TRACKS_MATCHED
      action: removeAndBlocklist

    # Individual track metadata doesn't match closely enough.
    # Lidarr: "Track match is not close enough"
    - match: TRACK_MATCH_NOT_CLOSE
      action: removeAndBlocklist

    # The file has no audio streams.
    # Lidarr: "No audio tracks detected"
    - match: NO_AUDIO_TRACKS
      action: removeAndBlocklist

    # Download is a RAR/ZIP that wasn't unpacked.
    # Lidarr: "Found archive file, might need to be extracted"
    - match: ARCHIVE_FILE
      action: removeAndBlocklist

    # Couldn't identify what artist/album this file is.
    # Lidarr: "Unable to parse file"
    - match: UNABLE_TO_PARSE
      action: none

    # Something went wrong during import processing.
    # Lidarr: "Unexpected error processing file"
    - match: UNEXPECTED_ERROR
      action: none

    # File is in use by another program, try again later.
    # Lidarr: "Locked file, try again later"
    - match: LOCKED_FILE
      action: none

    # File type is not a supported audio format.
    # Lidarr: "Invalid audio file, unsupported extension: '{extension}'"
    - match: UNSUPPORTED_EXTENSION
      action: none

    # Potentially harmful executable file found in download.
    # Lidarr: "Caution: Found executable file"
    - match: DANGEROUS_FILE
      action: none

    # Download client is reporting a generic error — investigate the download client.
    # Lidarr: "qBittorrent is reporting an error", "Deluge is reporting an error", "uTorrent is reporting an error"
    - match: DOWNLOAD_CLIENT_ERROR
      action: none

    # Can't access the download folder — check permissions/mounts.
    # Lidarr: "Import failed, path does not exist or is not accessible by Lidarr: {0}."
    - match: IMPORT_PATH_INACCESSIBLE
      action: none

  whisparr:
    # The file is a short sample/clip, not the full item.
    # Whisparr: "Sample"
    # Whisparr: "Unable to determine if file is a sample"
    - match: SAMPLE
      action: removeAndBlocklist

    # No files in the download could be imported.
    # Whisparr: "No files found are eligible for import in {0}"
    - match: NO_FILES_ELIGIBLE
      action: removeAndBlocklist

    # Download was matched by ID from grab history — manual import needed.
    # Whisparr: "Found matching series via grab history, but release was matched to series by ID."
    # Whisparr Eros: "Found matching movie via grab history, but release was matched to movie by ID."
    - match: MATCHED_VIA_GRAB_HISTORY
      action: removeAndBlocklist

    # The episode/movie was not in the release that was actually grabbed.
    # Whisparr: "Episode {0} was not found in the grabbed release: {1}"
    # Whisparr: "Episodes {0} were not found in the grabbed release: {1}"
    # Whisparr Eros: "Movie {0} was not found in the grabbed release: {1}"
    - match: NOT_IN_GRABBED_RELEASE
      action: removeAndBlocklist

    # The episode doesn't belong in this folder (folder name mismatch).
    # Whisparr: "Episode {0} was unexpected considering the {1} folder name"
    # Whisparr: "Episodes {0} were unexpected considering the {1} folder name"
    - match: EPISODE_UNEXPECTED_FOLDER
      action: removeAndBlocklist

    # Single file contains all episodes of the season — not supported as a single import.
    # Whisparr: "Single episode file contains all episodes in seasons."
    - match: FULL_SEASON_PACK
      action: removeAndBlocklist

    # Release quality is equal to or lower than what you already have.
    # Whisparr: "Not an upgrade for existing episode file(s). Existing quality: {0}. New Quality {1}."
    # Whisparr Eros: "Not an upgrade for existing movie file. Existing quality: {0}. New Quality {1}."
    - match: NOT_QUALITY_UPGRADE
      action: remove

    # Release revision number is not higher than existing (propers/repacks).
    # Whisparr: "Not a quality revision upgrade for existing episode file(s)"
    # Whisparr Eros: "Not a quality revision upgrade for existing movie file(s)"
    - match: NOT_REVISION_UPGRADE
      action: remove

    # Custom format scores are not better than existing.
    # Whisparr: "Not a Custom Format upgrade for existing episode file(s). New: [{0}] ({1}) do not improve on Existing: [{2}] ({3})"
    # Whisparr Eros: "Not a Custom Format upgrade for existing movie file(s). New: [{0}] ({1}) do not improve on Existing: [{2}] ({3})"
    - match: NOT_CUSTOM_FORMAT_UPGRADE
      action: remove

    # The season/episode numbers don't match anything on the show.
    # Whisparr: "Invalid season or episode"
    - match: INVALID_SEASON_OR_EPISODE
      action: removeAndBlocklist

    # This exact episode file was already imported before.
    # Whisparr: "Episode file already imported at {0}"
    - match: EPISODE_ALREADY_IMPORTED
      action: remove

    # This exact movie file was already imported before.
    # Whisparr Eros: "Movie file already imported at {0}"
    - match: MOVIE_ALREADY_IMPORTED
      action: remove

    # The video file has no audio streams.
    # Whisparr: "No audio tracks detected"
    - match: NO_AUDIO_TRACKS
      action: removeAndBlocklist

    # Download is a RAR/ZIP that wasn't unpacked.
    # Whisparr: "Found archive file, might need to be extracted"
    - match: ARCHIVE_FILE
      action: removeAndBlocklist

    # Not enough disk space to import the file.
    # Whisparr: "Not enough free space"
    - match: INSUFFICIENT_FREE_SPACE
      action: removeAndBlocklist

    # File is still being extracted/unraring.
    # Whisparr: "File is still being unpacked"
    - match: FILE_UNPACKING
      action: remove

    # Couldn't identify what show this file is.
    # Whisparr: "Unable to parse file"
    - match: UNABLE_TO_PARSE
      action: none

    # Something went wrong during import processing.
    # Whisparr: "Unexpected error processing file"
    - match: UNEXPECTED_ERROR
      action: none

    # File is in use by another program, try again later.
    # Whisparr: "Locked file, try again later"
    - match: LOCKED_FILE
      action: none

    # File type is not a supported video format.
    # Whisparr: "Invalid video file, unsupported extension: '{0}'"
    - match: UNSUPPORTED_EXTENSION
      action: none

    # Potentially harmful executable file found in download.
    # Whisparr: "Caution: Found executable file"
    # Whisparr Eros: "Caution: Found executable file with extension: '{extension}'"
    # Whisparr Eros: "Caution: Found potentially dangerous file with extension: {extension}"
    - match: DANGEROUS_FILE
      action: none

    # Download client is reporting a generic error — investigate the download client.
    # Whisparr: "qBittorrent is reporting an error", "Deluge is reporting an error", "uTorrent is reporting an error"
    # Whisparr Eros: "qBittorrent is reporting an error", "Deluge is reporting an error", "uTorrent is reporting an error"
    - match: DOWNLOAD_CLIENT_ERROR
      action: none

    # Can't access the download folder — check permissions/mounts.
    # Whisparr: "Import failed, path does not exist or is not accessible by Whisparr: {0}."
    - match: IMPORT_PATH_INACCESSIBLE
      action: none

    # Episode aired recently and doesn't have a title yet.
    # Whisparr: "Episode does not have a title and recently aired"
    - match: TITLE_MISSING
      action: none

    # Episode title is still listed as TBA.
    # Whisparr: "Episode has a TBA title and recently aired"
    - match: TITLE_TBA
      action: none

    # File on disk already has more episodes than this one.
    # Whisparr: "Episode file on disk contains more episodes than this file contains"
    - match: EXISTING_FILE_MORE_EPISODES
      action: none

    # Episode is split across multiple separate files.
    # Whisparr: "Single episode split into multiple files"
    - match: SPLIT_EPISODE
      action: none

    # Anime episode is missing its absolute episode number.
    # Whisparr: "Episode does not have an absolute episode number and recently aired"
    - match: MISSING_ABSOLUTE_NUMBER
      action: none

    # TheXEM scene mapping hasn't been confirmed yet for this episode.
    # Whisparr: "TheXEM mapping for this episode has not been confirmed yet."
    - match: UNVERIFIED_SCENE_MAPPING
      action: none
